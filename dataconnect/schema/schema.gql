type User @table(key: "clerkId") {
    clerkId: String! @unique
    email: String!
    username: String
    imageUrl: String
}

type Skill @table {
    id: UUID! @default(expr: "uuidV4()"),

    # relationship
    author: User!

    # skill content
    title: String!
    description: String!
    tags: [String!]!

    # technical
    installCommand: String!
    promptConfig: String!
    usageExample: String!
    
    # metadata
    createdAt: Timestamp! @default(expr: "request.time")
}
